name: Playwright BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Clean previous results
        run: npm run clean

      - name: Run API tests
        run: npx cucumber-js --profile ci --tags @api
        env:
          CI: true
          ENV: staging

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
          retention-days: 20

  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Clean previous results
        run: npm run clean

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Web tests
        run: npx cucumber-js --profile ci --tags @web
        env:
          CI: true
          ENV: staging

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web
          path: allure-results
          retention-days: 20
